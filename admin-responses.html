<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Admin — Responses</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <header>
        <div class="header-top-row">
          <h1>Saved Responses</h1>
          <button id="logout" class="button-secondary">Logout</button>
        </div>
      </header>
      <section class="card">
        <div id="status" class="message"></div>
        <table id="responses-table">
          <thead>
            <tr id="responses-head"></tr>
          </thead>
          <tbody id="responses-body"></tbody>
        </table>
      </section>
    </main>

    <script src="admin-responses.js"></script>
  </body>
</html>
