<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Medha Admin Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="center-card">
      <form id="admin-login-form" class="card">
        <h2>Admin Login</h2>
        <label>User ID
          <input type="text" name="adminUser" required autocomplete="username" />
        </label>
        <label>Password
          <input type="password" name="adminPass" required autocomplete="current-password" />
        </label>
        <div class="form-actions">
          <button type="submit">Login</button>
        </div>
        <p class="hint">Default: <strong>ADMIN</strong> / <strong>Medha9167</strong></p>
      </form>
    </main>

    <script src="admin.js"></script>
  </body>
</html>
